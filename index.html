<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>DigiKarlo | Digital Marketing Agency in Mumbai | SEO & Social Media</title>
    <meta name="description" content="DigiKarlo is a digital marketing agency in Mumbai offering SEO, social media marketing, and website design to grow your business online." />
    <meta name="robots" content="index, follow" />
    <meta name="keywords" content="digital marketing agency Mumbai, SEO agency Mumbai, social media marketing India, website design Mumbai, DigiKarlo" />
    <link rel="canonical" href="https://www.digikarlo.com/" />

    <!-- Open Graph / Social SEO -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.digikarlo.com/" />
    <meta property="og:title" content="DigiKarlo | Digital Marketing Agency Mumbai" />
    <meta property="og:description" content="Grow your business online with DigiKarlo — SEO, social media and ads." />
    <meta property="og:image" content="https://www.digikarlo.com/founder.jpeg" />
    <meta property="og:image:alt" content="Ankush Kadam, Founder of DigiKarlo" />
    <meta property="og:site_name" content="DigiKarlo" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DigiKarlo | Digital Marketing Agency in Mumbai" />
    <meta name="twitter:description" content="We build high-converting websites, run powerful ads, and rank your business on Google to bring you real customers." />
    <meta name="twitter:image" content="https://www.digikarlo.com/founder.jpeg" />

    <!-- Schema Markup: Local Business (helps Google understand your business) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "DigiKarlo",
      "url": "https://www.digikarlo.com",
      "logo": "https://www.digikarlo.com/founder.jpeg",
      "description": "DigiKarlo is a digital marketing agency in Mumbai offering SEO, social media marketing, website design and online advertising.",
      "founder": {
        "@type": "Person",
        "name": "Ankush Kadam"
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Mumbai",
        "addressRegion": "Maharashtra",
        "addressCountry": "IN"
      },
      "areaServed": ["Mumbai", "Maharashtra", "India"],
      "serviceType": ["SEO", "Social Media Marketing", "Website Design", "Digital Advertising"],
      "sameAs": [
        "https://www.instagram.com/digikarlo",
        "https://www.facebook.com/digikarlo"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
